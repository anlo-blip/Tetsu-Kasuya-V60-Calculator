<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseRush Prototype v1.1</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #12161b;
      --cell: #1c2229;
      --cell-border: #2a313a;
      --active: #67f0c1;
      --active-glow: rgba(103, 240, 193, 0.35);
      --text: #f3f5f7;
      --muted: #97a3af;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.04), transparent 35%),
        linear-gradient(180deg, #0b0d10 0%, #090b0e 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      padding: 20px;
    }

    .app {
      width: min(100%, 430px);
      background: rgba(18, 22, 27, 0.9);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding: 22px;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .score-box, .best-box {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .status {
      text-align: center;
      margin-bottom: 16px;
      color: var(--muted);
      min-height: 20px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
      user-select: none;
      touch-action: manipulation;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      background: linear-gradient(180deg, #212831 0%, #171c22 100%);
      border: 1px solid var(--cell-border);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .cell.active {
      background: linear-gradient(180deg, #80f6cf 0%, #4ed8ab 100%);
      border-color: #9ff8db;
      transform: scale(1.06);
      box-shadow: 0 0 0 8px var(--active-glow), 0 10px 30px rgba(103, 240, 193, 0.22);
    }

    .cell.hit {
      transform: scale(0.97);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.45);
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }

    .primary {
      background: var(--text);
      color: #0a0d11;
    }

    .secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .danger { color: var(--danger); }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="score-box">
        <div class="label">النقاط الحالية</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="best-box">
        <div class="label">أفضل نتيجة</div>
        <div class="value" id="best">0</div>
      </div>
    </div>

    <div class="status" id="status">اضغط ابدأ ثم المس المربعين المضيئين بإصبعين</div>

    <section class="grid" id="grid" aria-label="PulseRush grid"></section>

    <div class="controls">
      <button class="primary" id="startBtn">ابدأ / إعادة اللعب</button>
      <button class="secondary" id="resetBtn">تصفير الأفضل</button>
    </div>

    <div class="footer">
      <div>الإصدار: 1.1</div>
      <div>آخر تحديث: 2026-03-17</div>
    </div>
  </main>

  <script>
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');

    const GRID_SIZE = 9;
    const START_SPEED = 1100;
    const MIN_SPEED = 360;
    const SUCCESS_SPEED_MULTIPLIER = 0.95;
    const HIT_WINDOW = 260; // milliseconds between first and second hit

    let cells = [];
    let activeIndices = [];
    let tappedIndices = [];
    let score = 0;
    let best = Number(localStorage.getItem('pulserush_best') || 0);
    let speed = START_SPEED;
    let playing = false;
    let firstTapTime = 0;
    let hideTimer = null;

    bestEl.textContent = best;

    for (let i = 0; i < GRID_SIZE; i += 1) {
      const cell = document.createElement('button');
      cell.className = 'cell';
      cell.type = 'button';
      cell.setAttribute('aria-label', `Cell ${i + 1}`);
      cell.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        handleTap(i);
      });
      gridEl.appendChild(cell);
      cells.push(cell);
    }

    function updateScore() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
    }

    function clearVisuals() {
      cells.forEach(cell => cell.classList.remove('active', 'hit'));
    }

    function pickTwoIndices() {
      const picked = [];
      while (picked.length < 2) {
        const next = Math.floor(Math.random() * GRID_SIZE);
        if (!picked.includes(next)) picked.push(next);
      }
      return picked;
    }

    function showTargets() {
      clearVisuals();
      tappedIndices = [];
      firstTapTime = 0;
      activeIndices = pickTwoIndices();
      activeIndices.forEach(index => cells[index].classList.add('active'));
      statusEl.textContent = 'اضغط الهدفين الآن';

      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        if (playing && tappedIndices.length < 2) {
          endGame('تأخرت');
        }
      }, speed);
    }

    function nextRound() {
      if (!playing) return;
      speed = Math.max(MIN_SPEED, Math.round(speed * SUCCESS_SPEED_MULTIPLIER));
      showTargets();
    }

    function startGame() {
      clearTimeout(hideTimer);
      playing = true;
      score = 0;
      speed = START_SPEED;
      activeIndices = [];
      tappedIndices = [];
      firstTapTime = 0;
      updateScore();
      statusEl.textContent = 'استعد';
      clearVisuals();

      setTimeout(() => {
        if (playing) {
          speed = START_SPEED;
          showTargets();
        }
      }, 300);
    }

    function saveBest() {
      localStorage.setItem('pulserush_best', String(best));
    }

    function endGame(reason) {
      playing = false;
      clearTimeout(hideTimer);
      clearVisuals();

      if (score > best) {
        best = score;
        saveBest();
      }

      updateScore();
      statusEl.innerHTML = `<span class="danger">انتهت الجولة</span> — السبب: ${reason}`;
    }

    function handleTap(index) {
      if (!playing) return;

      if (!activeIndices.includes(index)) {
        endGame('ضغطت هدفًا خاطئًا');
        return;
      }

      if (tappedIndices.includes(index)) {
        endGame('كررت الضغط على نفس الهدف');
        return;
      }

      cells[index].classList.add('hit');
      tappedIndices.push(index);

      const now = performance.now();
      if (tappedIndices.length === 1) {
        firstTapTime = now;
        return;
      }

      if ((now - firstTapTime) > HIT_WINDOW) {
        endGame('الفارق بين الإصبعين كان متأخرًا');
        return;
      }

      score += 1;
      updateScore();
      statusEl.textContent = 'ممتاز';
      clearTimeout(hideTimer);
      setTimeout(nextRound, 120);
    }

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', () => {
      best = 0;
      saveBest();
      updateScore();
      statusEl.textContent = 'تم تصفير أفضل نتيجة';
    });
  </script>
</body>
</html>
