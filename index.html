<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseRush v1.3</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#0b0f14;color:#fff;font-family:sans-serif}
.app{width:360px;padding:20px;border-radius:20px;background:#111;box-shadow:0 0 40px rgba(0,0,0,.5)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.cell{aspect-ratio:1;border-radius:15px;background:#1c2430;transition:all .1s}
.active{background:#00ffcc;box-shadow:0 0 10px rgba(0,255,200,.6)}
.hit{transform:scale(.9);opacity:.8}
button{width:100%;padding:12px;border-radius:12px;border:none;font-weight:bold}
</style>
</head>
<body>
<div class="app">
<div id="status">ابدأ واتبع الإيقاع</div>
<div class="grid" id="grid"></div>
<button onclick="startGame()">ابدأ</button>
</div>

<script>
const grid=document.getElementById('grid');
const status=document.getElementById('status');

let cells=[];
let active=[];
let taps=[];
let playing=false;
let beat=700;
let score=0;
let best=0;

for(let i=0;i<9;i++){
 let c=document.createElement('div');
 c.className='cell';
 c.addEventListener('pointerdown',()=>tap(i));
 grid.appendChild(c);
 cells.push(c);
}

let ctx=new (window.AudioContext||window.webkitAudioContext)();

function beep(freq){
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.frequency.value=freq;
 g.gain.value=0.03;
 o.connect(g);g.connect(ctx.destination);
 o.start();
 o.stop(ctx.currentTime+0.05);
}

function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

function show(){
 cells.forEach(c=>c.classList.remove('active'));
 active=[];
 while(active.length<2){
  let r=Math.floor(Math.random()*9);
  if(!active.includes(r)) active.push(r);
 }
 active.forEach(i=>cells[i].classList.add('active'));

 beep(500+(700-beat));
 vibrate(10);
 taps=[];
}

function loop(){
 if(!playing) return;
 show();
 setTimeout(loop,beat);
}

function startGame(){
 playing=true;
 score=0;
 beat=700;
 loop();
}

function tap(i){
 if(!playing) return;

 if(!active.includes(i)){
  end();
  return;
 }

 if(taps.includes(i)){
  end();
  return;
 }

 cells[i].classList.add('hit');
 taps.push(i);
 beep(900);
 vibrate(20);

 if(taps.length===2){
  score++;

  if(score%3===0){
    beat=Math.max(300,beat*0.9);
  }

  if(score>best-2){
    status.innerHTML="🔥 قريب من رقمك!";
  }
 }
}

function end(){
 playing=false;
 if(score>best) best=score;

 let diff=best-score;
 if(diff<=2){
   status.innerHTML="💥 كنت قريب جدًا!";
 }else{
   status.innerHTML="💥 Lost the rhythm";
 }

 beep(150);
 vibrate(80);
}
</script>
</body>
</html>
