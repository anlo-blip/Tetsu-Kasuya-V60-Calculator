<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseRush v1.4.3</title>
  <style>
    :root {
      --bg1: #0a0d11;
      --bg2: #10161d;
      --panel: rgba(18, 22, 28, 0.94);
      --line: rgba(255,255,255,0.06);
      --cell-line: #2d3947;
      --active: #7af4cb;
      --active-2: #4ed8ab;
      --text: #f2f5f7;
      --muted: #9ba7b4;
      --danger: #ff6b6b;
      --success: #7af4cb;
      --warning: #ffd166;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    .app {
      width: min(100%, 430px);
      border-radius: 28px;
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 28px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      transition: transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .app.shake {
      animation: shake 0.18s linear 1;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      transition: color 0.12s ease, transform 0.12s ease;
    }

    .value.near {
      color: var(--warning);
      transform: scale(1.04);
    }

    .status {
      min-height: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 6px 0 14px;
    }

    .combo {
      min-height: 24px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 10px;
      opacity: 0;
      transform: scale(0.94);
      transition: all 0.12s ease;
    }

    .combo.show {
      opacity: 1;
      transform: scale(1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      user-select: none;
      touch-action: manipulation;
      margin-bottom: 18px;
    }

    .cell {
      aspect-ratio: 1/1;
      border-radius: 22px;
      border: 1px solid var(--cell-line);
      background: linear-gradient(180deg, #202833, #171d25);
      transition:
        transform 0.10s ease,
        box-shadow 0.10s ease,
        background 0.10s ease,
        border-color 0.10s ease,
        opacity 0.10s ease,
        filter 0.10s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .cell.active {
      transform: scale(1.06);
      border-color: #9df8dc;
      background: linear-gradient(180deg, var(--active), var(--active-2));
      box-shadow: 0 0 0 7px rgba(122,244,203,0.16), 0 10px 26px rgba(78,216,171,0.18);
    }

    .cell.hit {
      transform: scale(0.94);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.26);
      opacity: 0.92;
    }

    .cell.intense {
      filter: saturate(1.08) brightness(1.04);
      box-shadow: 0 0 0 9px rgba(122,244,203,0.20), 0 12px 30px rgba(78,216,171,0.22);
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button.control {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: var(--text);
      color: #0b0f13;
    }

    .secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    .danger { color: var(--danger); }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 10, 14, 0.84);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .overlay.show {
      display: flex;
    }

    .result-card {
      width: 100%;
      background: rgba(18,22,28,0.96);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 18px 48px rgba(0,0,0,0.40);
    }

    .result-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-sub {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .result-score {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .result-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.8;
    }

    .result-actions {
      display: flex;
      gap: 10px;
    }

    .result-actions button {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .progress-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.45s ease;
      background: radial-gradient(circle at center, rgba(122,244,203,0.10), transparent 58%);
    }

    .progress-glow.show-1 { opacity: 1; }
    .progress-glow.show-2 {
      opacity: 1;
      background: radial-gradient(circle at center, rgba(255,209,102,0.11), transparent 58%);
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 28px;
    }

    .pulse-ring.animate-1 { animation: shellPulse 0.65s ease; }
    .pulse-ring.animate-2 { animation: shellPulseStrong 0.7s ease; }

    @keyframes shellPulse {
      0%   { box-shadow: 0 0 0 0 rgba(122,244,203,0); }
      30%  { box-shadow: 0 0 0 12px rgba(122,244,203,0.14); }
      100% { box-shadow: 0 0 0 28px rgba(122,244,203,0); }
    }

    @keyframes shellPulseStrong {
      0%   { box-shadow: 0 0 0 0 rgba(255,209,102,0); }
      30%  { box-shadow: 0 0 0 14px rgba(255,209,102,0.16); }
      100% { box-shadow: 0 0 0 34px rgba(255,209,102,0); }
    }

    .mini-toast {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) scale(0.96);
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(15,22,34,0.88);
      border: 1px solid rgba(255,255,255,0.06);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: all 0.18s ease;
      z-index: 3;
      white-space: nowrap;
    }

    .mini-toast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="progress-glow" id="progressGlow"></div>
    <div class="pulse-ring" id="pulseRing"></div>
    <div class="mini-toast" id="miniToast">🎁 إنجاز جديد!</div>
    <div class="topbar">
      <div class="box">
        <div class="label">النقاط الحالية</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="box">
        <div class="label">أفضل نتيجة</div>
        <div class="value" id="best">0</div>
      </div>
    </div>

    <div class="status" id="status">ابدأ ثم المس المربعين المضيئين بسرعة</div>
    <div class="combo" id="combo">COMBO x2</div>

    <section class="grid" id="grid"></section>

    <div class="controls">
      <button class="control primary" id="startBtn">ابدأ / إعادة اللعب</button>
      <button class="control secondary" id="resetBtn">تصفير الأفضل</button>
    </div>

    <div class="footer">
      <div>الإصدار: 1.4.3</div>
      <div>آخر تحديث: 2026-03-18</div>
    </div>

    <div class="overlay" id="overlay">
      <div class="result-card">
        <div class="result-title" id="resultTitle">انتهت الجولة</div>
        <div class="result-sub" id="resultSub"></div>
        <div class="result-score" id="resultScore">0</div>
        <div class="result-meta" id="resultMeta"></div>
        <div class="result-actions">
          <button class="primary" id="playAgainBtn">إعادة اللعب</button>
          <button class="ghost" id="closeResultBtn">إغلاق</button>
        </div>
      </div>
    </div>
  </main>

<script>
const app = document.getElementById('app');
const gridEl = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const statusEl = document.getElementById('status');
const comboEl = document.getElementById('combo');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');

const overlay = document.getElementById('overlay');
const resultTitle = document.getElementById('resultTitle');
const resultSub = document.getElementById('resultSub');
const resultScore = document.getElementById('resultScore');
const resultMeta = document.getElementById('resultMeta');
const playAgainBtn = document.getElementById('playAgainBtn');
const closeResultBtn = document.getElementById('closeResultBtn');
const progressGlow = document.getElementById('progressGlow');
const pulseRing = document.getElementById('pulseRing');
const miniToast = document.getElementById('miniToast');

const GRID_SIZE = 9;
const START_SPEED = 1050;
const MIN_SPEED = 320;
const HIT_WINDOW = 280;
const ROUND_GAP = 120;

const SPEED_MAP = {
  0:1100,1:1080,2:1060,3:1040,4:1020,5:1000,
  6:990,7:980,8:970,9:960,10:950,11:940,12:930,
  13:920,14:910,15:900,16:890,17:880,18:870,
  19:850,20:830,21:810,22:790,23:770,24:750,
  25:730,26:710,27:690,28:670,
  29:640,30:610,31:580,32:550,33:520,34:500,
  35:480,36:460,37:440,38:420,39:400,40:380
};

const STAGE_LABELS = [
  { score: 0, label: '' },
  { score: 6, label: 'ثقة وثبات' },
  { score: 13, label: 'ممتاز، كمل' },
  { score: 19, label: 'بدأ الشد' },
  { score: 29, label: 'التحدي الحقيقي' }
];

let cells = [];
let activeIndices = [];
let tappedIndices = [];
let playing = false;
let score = 0;
let combo = 0;
let best = Number(localStorage.getItem('pulserush_best_v143_curve') || 0);
let speed = START_SPEED;
let firstTapTime = 0;
let hideTimer = null;
let comboTimer = null;
let audioCtx = null;
let roundId = 0;
let latestStageIndex = 0;

bestEl.textContent = best;

for (let i = 0; i < GRID_SIZE; i++) {
  const cell = document.createElement('button');
  cell.className = 'cell';
  cell.type = 'button';
  cell.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    handleTap(i);
  });
  gridEl.appendChild(cell);
  cells.push(cell);
}

function ensureAudio() {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}

function beep(freq = 660, duration = 0.05, type = 'sine', volume = 0.025) {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}


function showToast(text) {
  miniToast.textContent = text;
  miniToast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => miniToast.classList.remove('show'), 850);
}

function triggerProgressFX(level) {
  progressGlow.className = 'progress-glow';
  pulseRing.className = 'pulse-ring';
  void progressGlow.offsetWidth;
  progressGlow.classList.add(level === 1 ? 'show-1' : 'show-2');
  pulseRing.classList.add(level === 1 ? 'animate-1' : 'animate-2');

  clearTimeout(triggerProgressFX.timer);
  triggerProgressFX.timer = setTimeout(() => {
    progressGlow.className = 'progress-glow';
    pulseRing.className = 'pulse-ring';
  }, 760);
}

function updateScore() {
  scoreEl.textContent = score;
  bestEl.textContent = best;
  const nearBest = best > 0 && score >= best - 2;
  scoreEl.classList.toggle('near', nearBest);
}

function clearVisuals() {
  cells.forEach(c => c.classList.remove('active', 'hit', 'intense'));
}

function pickTwo() {
  const arr = [];
  while (arr.length < 2) {
    const n = Math.floor(Math.random() * GRID_SIZE);
    if (!arr.includes(n)) arr.push(n);
  }
  return arr;
}

function getSpeedForScore(currentScore) {
  return SPEED_MAP[currentScore] || 380;
}

function getStageIndex(currentScore) {
  let idx = 0;
  for (let i = 0; i < STAGE_LABELS.length; i++) {
    if (currentScore >= STAGE_LABELS[i].score) idx = i;
  }
  return idx;
}

function applyStageEffects() {
  speed = Math.max(MIN_SPEED, getSpeedForScore(score));
  const stageIndex = getStageIndex(score);

  const intense = score >= 29;
  activeIndices.forEach(i => {
    if (intense) cells[i].classList.add('intense');
  });

  if (stageIndex > latestStageIndex) {
    latestStageIndex = stageIndex;
    const label = STAGE_LABELS[stageIndex].label;
    if (label) {
      statusEl.textContent = label;
      beep(760 + stageIndex * 30, 0.05, 'triangle', 0.025);
      vibrate(22);
    }
  }
}

function showCombo() {
  if (combo < 2) {
    comboEl.classList.remove('show');
    return;
  }
  comboEl.textContent = `COMBO x${combo}`;
  comboEl.classList.add('show');
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => comboEl.classList.remove('show'), 320);
}

function showTargets() {
  if (!playing) return;

  roundId += 1;
  const thisRound = roundId;

  clearVisuals();
  tappedIndices = [];
  firstTapTime = 0;
  activeIndices = pickTwo();
  activeIndices.forEach(i => cells[i].classList.add('active'));

  applyStageEffects();

  const stageIndex = getStageIndex(score);
  const pulseFreq = 600 + (stageIndex * 30);
  beep(pulseFreq, 0.04, 'sine', 0.02);

  if (best > 0 && score >= best - 2) {
    statusEl.textContent = '🔥 قريب من رقمك!';
  } else if (STAGE_LABELS[stageIndex].label) {
    statusEl.textContent = STAGE_LABELS[stageIndex].label;
  } else {
    statusEl.textContent = 'اضغط الهدفين الآن';
  }

  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!playing || thisRound !== roundId) return;
    if (tappedIndices.length === 0) {
      endGame('ما ضغطت الهدفين!');
    } else if (tappedIndices.length === 1) {
      endGame('ما ضغطهم مع بعض!');
    }
  }, speed);
}

function nextRound() {
  if (!playing) return;
  setTimeout(showTargets, ROUND_GAP);
}

function hideOverlay() {
  overlay.classList.remove('show');
}

function startGame() {
  ensureAudio();
  clearTimeout(hideTimer);
  clearTimeout(comboTimer);
  hideOverlay();
  playing = true;
  score = 0;
  combo = 0;
  speed = START_SPEED;
  tappedIndices = [];
  activeIndices = [];
  firstTapTime = 0;
  latestStageIndex = 0;
  roundId = 0;
  comboEl.classList.remove('show');
  scoreEl.classList.remove('near');
  clearVisuals();
  updateScore();
  statusEl.textContent = 'استعد';
  setTimeout(() => { if (playing) showTargets(); }, 250);
}

function saveBest() {
  localStorage.setItem('pulserush_best_v143_curve', String(best));
}

function showResult(reason, previousBest, becameNewBest) {
  resultScore.textContent = score;
  if (becameNewBest) {
    resultTitle.textContent = '🏆 رقم جديد!';
    resultSub.textContent = 'هذه أفضل نتيجة لك حتى الآن';
    resultMeta.innerHTML = `أفضل نتيجة: <strong>${best}</strong>`;
  } else if (previousBest > 0 && score >= previousBest - 2) {
    const diff = Math.max(previousBest - score, 0);
    resultTitle.textContent = '💥 كنت قريب جدًا!';
    resultSub.textContent = diff === 0 ? 'عادلت أفضل نتيجة' : `باقي ${diff} وتكسرها`;
    resultMeta.innerHTML = `نتيجتك الحالية: <strong>${score}</strong><br>أفضل نتيجة: <strong>${best}</strong><br>سبب الخسارة: ${reason}`;
  } else {
    resultTitle.textContent = 'انتهت الجولة';
    resultSub.textContent = reason;
    resultMeta.innerHTML = `نتيجتك الحالية: <strong>${score}</strong><br>أفضل نتيجة: <strong>${best}</strong>`;
  }
  overlay.classList.add('show');
}

function endGame(reason) {
  playing = false;
  clearTimeout(hideTimer);
  clearVisuals();
  combo = 0;
  comboEl.classList.remove('show');

  const previousBest = best;
  let becameNewBest = false;
  if (score > best) {
    best = score;
    becameNewBest = true;
    saveBest();
  }
  updateScore();

  if (becameNewBest) {
    statusEl.innerHTML = `<span style="color:var(--success)">🏆 رقم جديد!</span>`;
  } else if (previousBest > 0 && score >= previousBest - 2) {
    statusEl.innerHTML = `<span class="danger">💥 كنت قريب جدًا!</span> — ${reason}`;
  } else {
    statusEl.innerHTML = `<span class="danger">انتهت الجولة</span> — السبب: ${reason}`;
  }

  showResult(reason, previousBest, becameNewBest);

  beep(180, 0.16, 'sawtooth', 0.045);
  vibrate(70);
  app.classList.remove('shake');
  void app.offsetWidth;
  app.classList.add('shake');
}

function handleTap(index) {
  if (!playing) return;

  if (!activeIndices.includes(index) || tappedIndices.includes(index)) {
    endGame('ضغطت مربع غلط!');
    return;
  }

  cells[index].classList.add('hit');
  tappedIndices.push(index);
  beep(860, 0.035, 'triangle', 0.02);
  vibrate(14);

  const now = performance.now();
  if (tappedIndices.length === 1) {
    firstTapTime = now;
    return;
  }

  if ((now - firstTapTime) > HIT_WINDOW) {
    endGame('انتهى الوقت .. خلك أسرع!');
    return;
  }

  score += 1;
  combo += 1;
  updateScore();
  showCombo();

  if (score === 20) {
    triggerProgressFX(1);
    showToast('🎁 إنجاز جديد!');
    statusEl.innerHTML = '<span style="color:var(--success)">🎁 إنجاز جديد!</span>';
    beep(980, 0.08, 'triangle', 0.03);
    vibrate(34);
  } else if (score === 40) {
    triggerProgressFX(2);
    showToast('🎁 مستوى متقدم!');
    statusEl.innerHTML = '<span style="color:var(--success)">🎁 مستوى متقدم!</span>';
    beep(1080, 0.09, 'triangle', 0.032);
    vibrate(46);
  } else {
    statusEl.textContent = combo >= 2 ? 'ممتاز، استمر' : 'نجاح';
  }

  clearTimeout(hideTimer);
  setTimeout(nextRound, 70);
}

startBtn.addEventListener('click', startGame);
playAgainBtn.addEventListener('click', startGame);
closeResultBtn.addEventListener('click', hideOverlay);

resetBtn.addEventListener('click', () => {
  best = 0;
  saveBest();
  updateScore();
  hideOverlay();
  statusEl.textContent = 'تم تصفير أفضل نتيجة';
});
</script>
</body>
</html>
